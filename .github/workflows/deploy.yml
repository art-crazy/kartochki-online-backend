name: Deploy backend

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  packages: write

env:
  IMAGE_NAME: ghcr.io/art-crazy/kartochki-online-backend:latest

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Test
        run: go test ./...

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ env.IMAGE_NAME }}

      - name: Configure SSH
        env:
          SERVER_DEPLOY_SSH_KEY: ${{ secrets.SERVER_DEPLOY_SSH_KEY }}
        run: |
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          printf '%s\n' "$SERVER_DEPLOY_SSH_KEY" > ~/.ssh/server_key
          chmod 600 ~/.ssh/server_key
          ssh-keyscan -H "${{ secrets.SERVER_HOST }}" >> ~/.ssh/known_hosts

      - name: Write backend env
        env:
          APP_ENV: production
          REDIS_ADDR: redis:6379
          YANDEX_CLIENT_ID: ${{ secrets.YANDEX_CLIENT_ID }}
          YANDEX_CLIENT_SECRET: ${{ secrets.YANDEX_CLIENT_SECRET }}
          VK_ID_APP_ID: ${{ secrets.VK_ID_APP_ID }}
          VK_ID_CLIENT_SECRET: ${{ secrets.VK_ID_CLIENT_SECRET }}
          AUTH_TELEGRAM_BOT_TOKEN: ${{ secrets.AUTH_TELEGRAM_BOT_TOKEN }}
          ROUTERAI_API_KEY: ${{ secrets.ROUTERAI_API_KEY }}
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
          EMAIL_FROM: ${{ secrets.EMAIL_FROM }}
          EMAIL_FROM_NAME: ${{ secrets.EMAIL_FROM_NAME }}
          EMAIL_REPLY_TO: ${{ secrets.EMAIL_REPLY_TO }}
          YOOKASSA_SHOP_ID: ${{ secrets.YOOKASSA_SHOP_ID }}
          YOOKASSA_SECRET_KEY: ${{ secrets.YOOKASSA_SECRET_KEY }}
        run: |
          set -a
          . ./config/production.env
          set +a

          {
            printf 'APP_ENV=%s\n' "$APP_ENV"
            printf 'FRONTEND_URL=%s\n' "$FRONTEND_URL"
            printf 'AUTH_ALLOWED_ORIGINS=%s\n' "$AUTH_ALLOWED_ORIGINS"
            printf 'REDIS_ADDR=%s\n' "$REDIS_ADDR"
            printf 'YANDEX_CLIENT_ID=%s\n' "$YANDEX_CLIENT_ID"
            printf 'YANDEX_CLIENT_SECRET=%s\n' "$YANDEX_CLIENT_SECRET"
            printf 'VK_ID_APP_ID=%s\n' "$VK_ID_APP_ID"
            printf 'VK_ID_CLIENT_SECRET=%s\n' "$VK_ID_CLIENT_SECRET"
            printf 'AUTH_TELEGRAM_BOT_TOKEN=%s\n' "$AUTH_TELEGRAM_BOT_TOKEN"
            printf 'ROUTERAI_API_KEY=%s\n' "$ROUTERAI_API_KEY"
            printf 'SMTP_HOST=%s\n' "$SMTP_HOST"
            printf 'SMTP_PORT=%s\n' "$SMTP_PORT"
            printf 'SMTP_USER=%s\n' "$SMTP_USER"
            printf 'SMTP_PASSWORD=%s\n' "$SMTP_PASSWORD"
            printf 'EMAIL_FROM=%s\n' "$EMAIL_FROM"
            printf 'EMAIL_FROM_NAME=%s\n' "$EMAIL_FROM_NAME"
            printf 'EMAIL_REPLY_TO=%s\n' "$EMAIL_REPLY_TO"
            printf 'YOOKASSA_SHOP_ID=%s\n' "$YOOKASSA_SHOP_ID"
            printf 'YOOKASSA_SECRET_KEY=%s\n' "$YOOKASSA_SECRET_KEY"
          } > backend.env

          scp -i ~/.ssh/server_key backend.env ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }}:/tmp/kartochki-backend.env
          ssh -i ~/.ssh/server_key ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }} 'bash -s' <<'REMOTE_SCRIPT'
            set -e
            test -s /opt/kartochki/postgres.env
            set -a
            . /opt/kartochki/postgres.env
            set +a
            POSTGRES_DSN="$(python3 -c 'import os; from urllib.parse import quote; user=quote(os.environ["POSTGRES_USER"], safe=""); password=quote(os.environ["POSTGRES_PASSWORD"], safe=""); db=quote(os.environ["POSTGRES_DB"], safe=""); print(f"postgres://{user}:{password}@postgres:5432/{db}?sslmode=disable")')"
            {
              cat /tmp/kartochki-backend.env
              printf "POSTGRES_DSN=%s\n" "$POSTGRES_DSN"
            } > /tmp/kartochki-backend.env.with-dsn
            install -m 0600 /tmp/kartochki-backend.env.with-dsn /opt/kartochki/backend.env
            rm -f /tmp/kartochki-backend.env
            rm -f /tmp/kartochki-backend.env.with-dsn
          REMOTE_SCRIPT

      - name: Deploy backend
        run: |
          ssh -i ~/.ssh/server_key ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }} '
            cd /opt/kartochki
            ./deploy.sh backend
          '
