version: "2"
sql:
  - engine: "postgresql"
    queries: "db/queries"
    schema:
      - "db/migrations/*.up.sql"
    gen:
      go:
        package: "dbgen"
        out: "internal/dbgen"
        sql_package: "pgx/v5"
        overrides:
          - db_type: "uuid"
            go_type:
              import: "github.com/google/uuid"
              package: "uuid"
              type: "UUID"
