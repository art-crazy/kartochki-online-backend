openapi: 3.0.3
info:
  title: kartochki.online API
  version: 0.1.0
  description: |
    Публичный API сервиса kartochki.online.

    Эта спецификация является источником правды для автогенерации frontend-клиента.
    Реализация backend и этот файл должны оставаться синхронными.
servers:
  - url: /
    description: Текущий хост, с которого открыта спецификация
  - url: http://localhost:8080
    description: Локальный backend для разработки

paths:
  # Infrastructure endpoints stay outside /api/v1 because deployment tooling
  # and local checks often call them directly without user auth.
  /health/live:
    $ref: "./paths/health.yaml#/paths/~1health~1live"
  /health/ready:
    $ref: "./paths/health.yaml#/paths/~1health~1ready"

  /api/v1/auth/register:
