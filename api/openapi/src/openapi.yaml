    $ref: "./paths/blog.yaml#/paths/~1api~1v1~1public~1blog~1{slug}"

components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: opaque
      description: "Передавайте токен в заголовке Authorization: Bearer <token>."
    CookieAuth:
      type: apiKey
      in: cookie
      name: auth_token
      description: "HttpOnly-кука auth_token, устанавливается автоматически при входе. Браузер прикладывает её к каждому запросу без дополнительного кода."
