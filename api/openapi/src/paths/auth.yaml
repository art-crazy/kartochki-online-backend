paths:
  /api/v1/auth/vk/widget:
    post:
      summary: Войти через VK ID One Tap
      description: |
        Frontend показывает виджет VK ID One Tap и после LOGIN_SUCCESS отправляет `code`, `device_id`, `code_verifier` и `redirect_uri` на backend.
        Backend проверяет payload у VK ID, находит или создаёт пользователя, привязывает OAuth-аккаунт и открывает локальную сессию.
      operationId: loginWithVkWidget
      tags:
        - Auth
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "../components/schemas/auth.yaml#/schemas/VkWidgetLoginRequest"
      responses:
        "200":
          description: Вход через VK ID завершён, локальная сессия создана
          headers:
            X-Request-ID:
              description: Идентификатор запроса для поиска в логах.
              schema:
                type: string
            Set-Cookie:
              description: "Устанавливает HttpOnly-куку auth_token с токеном сессии."
              schema:
                type: string
                example: "auth_token=<token>; HttpOnly; SameSite=Lax; Path=/"
          content:
            application/json:
              schema:
                $ref: "../components/schemas/auth.yaml#/schemas/AuthResponse"
        "400":
          description: Payload виджета отсутствует или некорректен
          content:
            application/json:
              schema:
                $ref: "../components/schemas/common.yaml#/schemas/ErrorResponse"
        "401":
          description: VK ID отклонил code, device_id, code_verifier или redirect_uri
          content:
            application/json:
              schema:
                $ref: "../components/schemas/common.yaml#/schemas/ErrorResponse"
        "409":
          description: Email уже связан с другим способом входа
          content:
            application/json:
              schema:
                $ref: "../components/schemas/common.yaml#/schemas/ErrorResponse"
        "500":
          description: VK ID недоступен или вернул неожиданный ответ
          content:
            application/json:
              schema:
                $ref: "../components/schemas/common.yaml#/schemas/ErrorResponse"
        "501":
          description: Вход через VK ID пока не настроен
          content:
            application/json:
              schema:
                $ref: "../components/schemas/common.yaml#/schemas/ErrorResponse"
  /api/v1/auth/yandex/widget:
    post:
      summary: Войти через Яндекс по access token
      description: |
        Альтернативный вход через Яндекс ID, когда frontend использует официальный виджет.

        Frontend получает `access_token` через postMessage и отправляет его на backend.
        Backend проверяет токен через userinfo, находит или создаёт пользователя и открывает локальную сессию.
      operationId: loginWithYandexWidget
      tags:
        - Auth
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "../components/schemas/auth.yaml#/schemas/YandexWidgetLoginRequest"
      responses:
        "200":
          description: Вход через Яндекс завершён, локальная сессия создана
          headers:
            X-Request-ID:
              description: Идентификатор запроса для поиска в логах.
              schema:
                type: string
            Set-Cookie:
              description: "Устанавливает HttpOnly-куку auth_token с токеном сессии."
              schema:
                type: string
                example: "auth_token=<token>; HttpOnly; SameSite=Lax; Path=/"
          content:
            application/json:
              schema:
                $ref: "../components/schemas/auth.yaml#/schemas/AuthResponse"
        "400":
          description: Payload виджета отсутствует или некорректен
          headers:
            X-Request-ID:
              description: Идентификатор запроса для поиска в логах.
              schema:
                type: string
          content:
            application/json:
              schema:
                $ref: "../components/schemas/common.yaml#/schemas/ErrorResponse"
        "401":
          description: Яндекс отклонил access token
          content:
            application/json:
              schema:
                $ref: "../components/schemas/common.yaml#/schemas/ErrorResponse"
        "409":
          description: Email уже связан с другим способом входа
          content:
            application/json:
              schema:
                $ref: "../components/schemas/common.yaml#/schemas/ErrorResponse"
        "500":
          description: Яндекс ID недоступен или вернул неожиданный ответ
          headers:
            X-Request-ID:
              description: Идентификатор запроса для поиска в логах.
              schema:
                type: string
          content:
            application/json:
              schema:
                $ref: "../components/schemas/common.yaml#/schemas/ErrorResponse"
        "501":
          description: Вход через Яндекс пока не настроен
          headers:
            X-Request-ID:
              description: Идентификатор запроса для поиска в логах.
              schema:
                type: string
          content:
            application/json:
              schema:
                $ref: "../components/schemas/common.yaml#/schemas/ErrorResponse"
  /api/v1/auth/register:
    post:
      summary: Регистрация по email и паролю
      description: Создаёт нового пользователя и сразу открывает первую сессию.
      operationId: registerAuthUser
      tags:
        - Auth
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "../components/schemas/auth.yaml#/schemas/RegisterRequest"
      responses:
        "201":
          description: Пользователь создан и сразу авторизован
          headers:
            X-Request-ID:
              description: Идентификатор запроса для поиска в логах.
              schema:
                type: string
            Set-Cookie:
              description: "Устанавливает HttpOnly-куку auth_token с токеном сессии."
              schema:
                type: string
                example: "auth_token=<token>; HttpOnly; SameSite=Lax; Path=/"
          content:
            application/json:
              schema:
                $ref: "../components/schemas/auth.yaml#/schemas/AuthResponse"
        "400":
          description: Ошибка валидации входных данных
          headers:
            X-Request-ID:
              description: Идентификатор запроса для поиска в логах.
              schema:
                type: string
          content:
            application/json:
              schema:
                $ref: "../components/schemas/common.yaml#/schemas/ErrorResponse"
        "409":
          description: Пользователь с таким email уже существует
          headers:
            X-Request-ID:
              description: Идентификатор запроса для поиска в логах.
              schema:
                type: string
          content:
            application/json:
              schema:
                $ref: "../components/schemas/common.yaml#/schemas/ErrorResponse"

  /api/v1/auth/login:
    post:
      summary: Вход по email и паролю
      description: Проверяет учётные данные и создаёт новую пользовательскую сессию.
      operationId: loginAuthUser
      tags:
        - Auth
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "../components/schemas/auth.yaml#/schemas/LoginRequest"
      responses:
        "200":
          description: Пользователь успешно авторизован
          headers:
            X-Request-ID:
              description: Идентификатор запроса для поиска в логах.
              schema:
                type: string
            Set-Cookie:
              description: "Устанавливает HttpOnly-куку auth_token с токеном сессии."
              schema:
                type: string
                example: "auth_token=<token>; HttpOnly; SameSite=Lax; Path=/"
          content:
            application/json:
              schema:
                $ref: "../components/schemas/auth.yaml#/schemas/AuthResponse"
        "400":
          description: Ошибка валидации входных данных
          headers:
            X-Request-ID:
              description: Идентификатор запроса для поиска в логах.
              schema:
                type: string
          content:
            application/json:
              schema:
                $ref: "../components/schemas/common.yaml#/schemas/ErrorResponse"
        "401":
          description: Неверный email или пароль
          headers:
            X-Request-ID:
              description: Идентификатор запроса для поиска в логах.
              schema:
                type: string
          content:
            application/json:
              schema:
                $ref: "../components/schemas/common.yaml#/schemas/ErrorResponse"

  /api/v1/auth/telegram/login:
    post:
      summary: Вход через Telegram
      description: |
        Завершает вход через Telegram Login Widget.

        Frontend сначала показывает официальный Telegram Login Widget. После успешного входа
        Telegram возвращает набор подписанных полей: `id`, `first_name`, `last_name`,
        `username`, `photo_url`, `auth_date`, `hash`.

        Frontend должен отправить эти поля на backend без изменений. Backend проверяет подпись
        по токену Telegram-бота, убеждается что данные ещё не устарели, а затем находит
        или создаёт локального пользователя и открывает обычную локальную сессию.

        У Telegram может не быть email. Поэтому в ответе поле `user.email` может отсутствовать.
      operationId: loginWithTelegram
      tags:
        - Auth
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "../components/schemas/auth.yaml#/schemas/TelegramLoginRequest"
      responses:
        "200":
          description: Вход через Telegram завершён, локальная сессия создана
          headers:
            X-Request-ID:
              description: Идентификатор запроса для поиска в логах.
              schema:
                type: string
            Set-Cookie:
              description: "Устанавливает HttpOnly-куку auth_token с токеном сессии."
              schema:
                type: string
                example: "auth_token=<token>; HttpOnly; SameSite=Lax; Path=/"
          content:
            application/json:
              schema:
                $ref: "../components/schemas/auth.yaml#/schemas/AuthResponse"
        "400":
          description: Подписанные данные Telegram отсутствуют, испорчены или устарели
          headers:
            X-Request-ID:
              description: Идентификатор запроса для поиска в логах.
              schema:
                type: string
          content:
            application/json:
              schema:
                $ref: "../components/schemas/common.yaml#/schemas/ErrorResponse"
        "501":
          description: Вход через Telegram пока не настроен
          headers:
            X-Request-ID:
              description: Идентификатор запроса для поиска в логах.
              schema:
                type: string
          content:
            application/json:
              schema:
                $ref: "../components/schemas/common.yaml#/schemas/ErrorResponse"

  /api/v1/auth/logout:
    post:
      summary: Выход из текущей сессии
      description: Отзывает активную сессию и сбрасывает куку auth_token.
      operationId: logoutAuthUser
      tags:
        - Auth
      security:
        - BearerAuth: []
        - CookieAuth: []
      responses:
        "200":
          description: Текущая сессия завершена
          headers:
            X-Request-ID:
              description: Идентификатор запроса для поиска в логах.
              schema:
                type: string
            Set-Cookie:
              description: "Сбрасывает куку auth_token (Max-Age=0)."
              schema:
                type: string
                example: "auth_token=; HttpOnly; SameSite=Lax; Path=/; Max-Age=0"
          content:
            application/json:
              schema:
                $ref: "../components/schemas/common.yaml#/schemas/StatusResponse"
        "401":
          description: Токен отсутствует, истёк или недействителен
          headers:
            X-Request-ID:
              description: Идентификатор запроса для поиска в логах.
              schema:
                type: string
          content:
            application/json:
              schema:
                $ref: "../components/schemas/common.yaml#/schemas/ErrorResponse"

  /api/v1/me:
    get:
      summary: Получить текущего пользователя
      description: Возвращает данные пользователя из текущей авторизованной сессии.
      operationId: getCurrentUser
      tags:
        - Auth
      security:
        - BearerAuth: []
        - CookieAuth: []
      responses:
        "200":
          description: Данные текущего пользователя
          headers:
            X-Request-ID:
              description: Идентификатор запроса для поиска в логах.
              schema:
                type: string
          content:
            application/json:
              schema:
                $ref: "../components/schemas/auth.yaml#/schemas/CurrentUserResponse"
        "401":
          description: Токен отсутствует, истёк или недействителен
          headers:
            X-Request-ID:
              description: Идентификатор запроса для поиска в логах.
              schema:
                type: string
          content:
            application/json:
              schema:
                $ref: "../components/schemas/common.yaml#/schemas/ErrorResponse"

  /api/v1/auth/forgot-password:
    post:
      summary: Запросить сброс пароля
      description: |
        Отправляет письмо со ссылкой для сброса пароля на указанный email.

        Ответ всегда `200` независимо от того, найден пользователь или нет.
        Это сделано намеренно, чтобы не раскрывать факт существования аккаунта по email.

        Все предыдущие активные токены сброса для этого пользователя инвалидируются —
        в каждый момент времени действует только один токен.
      operationId: forgotPassword
      tags:
        - Auth
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "../components/schemas/auth.yaml#/schemas/ForgotPasswordRequest"
      responses:
        "200":
          description: Запрос принят. Если аккаунт найден — письмо будет отправлено.
          headers:
            X-Request-ID:
              description: Идентификатор запроса для поиска в логах.
              schema:
                type: string
          content:
            application/json:
              schema:
                $ref: "../components/schemas/common.yaml#/schemas/StatusResponse"
        "400":
          description: Ошибка валидации входных данных
          headers:
            X-Request-ID:
              description: Идентификатор запроса для поиска в логах.
              schema:
                type: string
          content:
            application/json:
              schema:
                $ref: "../components/schemas/common.yaml#/schemas/ErrorResponse"

  /api/v1/auth/reset-password:
    post:
      summary: Установить новый пароль по токену из письма
      description: |
        Проверяет одноразовый токен из письма и устанавливает новый пароль.

        Токен действителен однократно и только в течение срока жизни, заданного на backend.
        После использования токен помечается и повторный запрос с тем же токеном вернёт ошибку.
      operationId: resetPassword
      tags:
        - Auth
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "../components/schemas/auth.yaml#/schemas/ResetPasswordRequest"
      responses:
        "200":
          description: Пароль успешно изменён
          headers:
            X-Request-ID:
              description: Идентификатор запроса для поиска в логах.
              schema:
                type: string
          content:
            application/json:
              schema:
                $ref: "../components/schemas/common.yaml#/schemas/StatusResponse"
        "400":
          description: Токен недействителен, истёк или уже был использован; либо пароль не прошёл валидацию
          headers:
            X-Request-ID:
              description: Идентификатор запроса для поиска в логах.
              schema:
                type: string
          content:
            application/json:
              schema:
                $ref: "../components/schemas/common.yaml#/schemas/ErrorResponse"
