paths:
  /api/v1/projects:
    get:
      summary: Получить список проектов текущего пользователя
      description: Возвращает только активные проекты текущего пользователя, отсортированные по дате обновления.
      operationId: listProjects
      tags:
        - Projects
      security:
        - BearerAuth: []
      responses:
        "200":
          description: Список проектов пользователя
          headers:
            X-Request-ID:
              description: Идентификатор запроса для поиска в логах.
              schema:
                type: string
          content:
            application/json:
              schema:
                $ref: "../components/schemas/projects.yaml#/schemas/ProjectListResponse"
        "401":
          description: Токен отсутствует, истёк или недействителен
          headers:
            X-Request-ID:
              description: Идентификатор запроса для поиска в логах.
              schema:
                type: string
          content:
            application/json:
              schema:
                $ref: "../components/schemas/common.yaml#/schemas/ErrorResponse"
        "500":
          description: Внутренняя ошибка при загрузке списка проектов
          headers:
            X-Request-ID:
              description: Идентификатор запроса для поиска в логах.
              schema:
                type: string
          content:
            application/json:
              schema:
                $ref: "../components/schemas/common.yaml#/schemas/ErrorResponse"
    post:
      summary: Создать новый проект
      description: Создаёт новый проект текущего пользователя со статусом `draft`.
      operationId: createProject
      tags:
        - Projects
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "../components/schemas/projects.yaml#/schemas/CreateProjectRequest"
      responses:
        "201":
          description: Проект успешно создан
          headers:
            X-Request-ID:
              description: Идентификатор запроса для поиска в логах.
              schema:
                type: string
          content:
            application/json:
              schema:
                $ref: "../components/schemas/projects.yaml#/schemas/ProjectResponse"
        "400":
          description: Ошибка валидации входных данных
          headers:
            X-Request-ID:
              description: Идентификатор запроса для поиска в логах.
              schema:
                type: string
          content:
            application/json:
              schema:
                $ref: "../components/schemas/common.yaml#/schemas/ErrorResponse"
        "401":
          description: Токен отсутствует, истёк или недействителен
          headers:
            X-Request-ID:
              description: Идентификатор запроса для поиска в логах.
              schema:
                type: string
          content:
            application/json:
              schema:
                $ref: "../components/schemas/common.yaml#/schemas/ErrorResponse"
        "500":
          description: Внутренняя ошибка при создании проекта
          headers:
            X-Request-ID:
              description: Идентификатор запроса для поиска в логах.
              schema:
                type: string
          content:
            application/json:
              schema:
                $ref: "../components/schemas/common.yaml#/schemas/ErrorResponse"

  /api/v1/projects/{id}:
    get:
      summary: Получить проект по идентификатору
      description: Возвращает активный проект текущего пользователя по его идентификатору.
      operationId: getProjectById
      tags:
        - Projects
      security:
        - BearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          description: Идентификатор проекта.
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Проект найден
          headers:
            X-Request-ID:
              description: Идентификатор запроса для поиска в логах.
              schema:
                type: string
          content:
            application/json:
              schema:
                $ref: "../components/schemas/projects.yaml#/schemas/ProjectResponse"
        "401":
          description: Токен отсутствует, истёк или недействителен
          headers:
            X-Request-ID:
              description: Идентификатор запроса для поиска в логах.
              schema:
                type: string
          content:
            application/json:
              schema:
                $ref: "../components/schemas/common.yaml#/schemas/ErrorResponse"
        "404":
          description: Проект не найден или не принадлежит текущему пользователю
          headers:
            X-Request-ID:
              description: Идентификатор запроса для поиска в логах.
              schema:
                type: string
          content:
            application/json:
              schema:
                $ref: "../components/schemas/common.yaml#/schemas/ErrorResponse"
        "500":
          description: Внутренняя ошибка при загрузке проекта
          headers:
            X-Request-ID:
              description: Идентификатор запроса для поиска в логах.
              schema:
                type: string
          content:
            application/json:
              schema:
                $ref: "../components/schemas/common.yaml#/schemas/ErrorResponse"
    patch:
      summary: Частично обновить проект
      description: Обновляет только те поля проекта, которые были переданы в запросе.
      operationId: patchProject
      tags:
        - Projects
      security:
        - BearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          description: Идентификатор проекта.
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "../components/schemas/projects.yaml#/schemas/PatchProjectRequest"
      responses:
        "200":
          description: Проект успешно обновлён
          headers:
            X-Request-ID:
              description: Идентификатор запроса для поиска в логах.
              schema:
                type: string
          content:
            application/json:
              schema:
                $ref: "../components/schemas/projects.yaml#/schemas/ProjectResponse"
        "400":
          description: Ошибка валидации входных данных
          headers:
            X-Request-ID:
              description: Идентификатор запроса для поиска в логах.
              schema:
                type: string
          content:
            application/json:
              schema:
                $ref: "../components/schemas/common.yaml#/schemas/ErrorResponse"
        "401":
          description: Токен отсутствует, истёк или недействителен
          headers:
            X-Request-ID:
              description: Идентификатор запроса для поиска в логах.
              schema:
                type: string
          content:
            application/json:
              schema:
                $ref: "../components/schemas/common.yaml#/schemas/ErrorResponse"
        "404":
          description: Проект не найден или не принадлежит текущему пользователю
          headers:
            X-Request-ID:
              description: Идентификатор запроса для поиска в логах.
              schema:
                type: string
          content:
            application/json:
              schema:
                $ref: "../components/schemas/common.yaml#/schemas/ErrorResponse"
        "500":
          description: Внутренняя ошибка при обновлении проекта
          headers:
            X-Request-ID:
              description: Идентификатор запроса для поиска в логах.
              schema:
                type: string
          content:
            application/json:
              schema:
                $ref: "../components/schemas/common.yaml#/schemas/ErrorResponse"
    delete:
      summary: Удалить проект
      description: Мягко удаляет проект текущего пользователя. После этого проект исчезает из списков и больше не доступен по API, но запись остаётся в системе для истории и будущих связей.
      operationId: deleteProject
      tags:
        - Projects
      security:
        - BearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          description: Идентификатор проекта.
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Проект успешно удалён
          headers:
            X-Request-ID:
              description: Идентификатор запроса для поиска в логах.
              schema:
                type: string
          content:
            application/json:
              schema:
                $ref: "../components/schemas/common.yaml#/schemas/StatusResponse"
        "401":
          description: Токен отсутствует, истёк или недействителен
          headers:
            X-Request-ID:
              description: Идентификатор запроса для поиска в логах.
              schema:
                type: string
          content:
            application/json:
              schema:
                $ref: "../components/schemas/common.yaml#/schemas/ErrorResponse"
        "404":
          description: Проект не найден или не принадлежит текущему пользователю
          headers:
            X-Request-ID:
              description: Идентификатор запроса для поиска в логах.
              schema:
                type: string
          content:
            application/json:
              schema:
                $ref: "../components/schemas/common.yaml#/schemas/ErrorResponse"
        "500":
          description: Внутренняя ошибка при удалении проекта
          headers:
            X-Request-ID:
              description: Идентификатор запроса для поиска в логах.
              schema:
                type: string
          content:
            application/json:
              schema:
                $ref: "../components/schemas/common.yaml#/schemas/ErrorResponse"
