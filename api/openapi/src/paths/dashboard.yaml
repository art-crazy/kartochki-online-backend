paths:
  /api/v1/dashboard:
    get:
      summary: Данные для главной страницы приложения
      description: Возвращает статистику, последние и все проекты пользователя, а также CTA-блок быстрого старта.
      operationId: getDashboard
      tags:
        - Dashboard
      security:
        - BearerAuth: []
        - CookieAuth: []
      responses:
        "200":
          description: Данные дашборда
          headers:
            X-Request-ID:
              description: Идентификатор запроса для поиска в логах.
              schema:
                type: string
          content:
            application/json:
              schema:
                $ref: "../components/schemas/dashboard.yaml#/schemas/DashboardResponse"
        "401":
          description: Токен отсутствует, истёк или недействителен
          headers:
            X-Request-ID:
              description: Идентификатор запроса для поиска в логах.
              schema:
                type: string
          content:
            application/json:
              schema:
                $ref: "../components/schemas/common.yaml#/schemas/ErrorResponse"
        "500":
          description: Внутренняя ошибка при сборке дашборда
          headers:
            X-Request-ID:
              description: Идентификатор запроса для поиска в логах.
              schema:
                type: string
          content:
            application/json:
              schema:
                $ref: "../components/schemas/common.yaml#/schemas/ErrorResponse"
