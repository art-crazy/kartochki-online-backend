paths:
  /api/v1/settings:
    get:
      summary: Данные страницы настроек
      description: Возвращает профиль, дефолтные настройки, уведомления, активные сессии, интеграции и API-ключ.
      operationId: getSettings
      tags:
        - Settings
      security:
        - BearerAuth: []
        - CookieAuth: []
      responses:
        "200":
          description: Данные настроек
          headers:
            X-Request-ID:
              description: Request identifier for correlating logs.
              schema:
                type: string
          content:
            application/json:
              schema:
                $ref: "../components/schemas/settings.yaml#/schemas/SettingsResponse"
        "401":
          description: Токен отсутствует, истёк или недействителен
          headers:
            X-Request-ID:
              description: Request identifier for correlating logs.
              schema:
                type: string
          content:
            application/json:
              schema:
                $ref: "../components/schemas/common.yaml#/schemas/ErrorResponse"
        "500":
          description: Внутренняя ошибка при загрузке настроек
          headers:
            X-Request-ID:
              description: Request identifier for correlating logs.
              schema:
                type: string
          content:
            application/json:
              schema:
                $ref: "../components/schemas/common.yaml#/schemas/ErrorResponse"

  /api/v1/settings/profile:
    patch:
      summary: Обновить профиль пользователя
      operationId: patchSettingsProfile
      tags:
        - Settings
      security:
        - BearerAuth: []
        - CookieAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "../components/schemas/settings.yaml#/schemas/UpdateProfileRequest"
      responses:
        "200":
          description: Профиль успешно обновлён
          headers:
            X-Request-ID:
              description: Request identifier for correlating logs.
              schema:
                type: string
          content:
            application/json:
              schema:
                $ref: "../components/schemas/settings.yaml#/schemas/SettingsProfile"
        "400":
          description: Ошибка валидации
          headers:
            X-Request-ID:
              description: Request identifier for correlating logs.
              schema:
                type: string
          content:
            application/json:
              schema:
                $ref: "../components/schemas/common.yaml#/schemas/ErrorResponse"
        "401":
          description: Токен отсутствует, истёк или недействителен
          headers:
            X-Request-ID:
              description: Request identifier for correlating logs.
              schema:
                type: string
          content:
            application/json:
              schema:
                $ref: "../components/schemas/common.yaml#/schemas/ErrorResponse"
        "409":
          description: Email уже занят
          headers:
            X-Request-ID:
              description: Request identifier for correlating logs.
              schema:
                type: string
          content:
            application/json:
              schema:
                $ref: "../components/schemas/common.yaml#/schemas/ErrorResponse"
        "500":
          description: Внутренняя ошибка при сохранении профиля
          headers:
            X-Request-ID:
              description: Request identifier for correlating logs.
              schema:
                type: string
          content:
            application/json:
              schema:
                $ref: "../components/schemas/common.yaml#/schemas/ErrorResponse"

  /api/v1/settings/avatar:
    post:
      summary: Загрузить аватарку пользователя
      description: Принимает один файл изображения и переключает профиль на кастомный аватар.
      operationId: uploadSettingsAvatar
      tags:
        - Settings
      security:
        - BearerAuth: []
        - CookieAuth: []
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required:
                - file
              properties:
                file:
                  type: string
                  format: binary
      responses:
        "201":
          description: Аватарка успешно загружена
          headers:
            X-Request-ID:
              description: Request identifier for correlating logs.
              schema:
                type: string
          content:
            application/json:
              schema:
                $ref: "../components/schemas/settings.yaml#/schemas/SettingsAvatarResponse"
        "400":
          description: Файл отсутствует или тип изображения не поддерживается
          headers:
            X-Request-ID:
              description: Request identifier for correlating logs.
              schema:
                type: string
          content:
            application/json:
              schema:
                $ref: "../components/schemas/common.yaml#/schemas/ErrorResponse"
        "401":
          description: Токен отсутствует, истёк или недействителен
          headers:
            X-Request-ID:
              description: Request identifier for correlating logs.
              schema:
                type: string
          content:
            application/json:
              schema:
                $ref: "../components/schemas/common.yaml#/schemas/ErrorResponse"
        "500":
          description: Внутренняя ошибка при загрузке аватарки
          headers:
            X-Request-ID:
              description: Request identifier for correlating logs.
              schema:
                type: string
          content:
            application/json:
              schema:
                $ref: "../components/schemas/common.yaml#/schemas/ErrorResponse"
  /api/v1/settings/defaults:
    patch:
      summary: Обновить дефолтные настройки генерации
      operationId: patchSettingsDefaults
      tags:
        - Settings
      security:
        - BearerAuth: []
        - CookieAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "../components/schemas/settings.yaml#/schemas/UpdateDefaultsRequest"
      responses:
        "200":
          description: Настройки по умолчанию успешно обновлены
          headers:
            X-Request-ID:
              description: Request identifier for correlating logs.
              schema:
                type: string
          content:
            application/json:
              schema:
                $ref: "../components/schemas/settings.yaml#/schemas/SettingsDefaults"
        "400":
          description: Ошибка валидации
          headers:
            X-Request-ID:
              description: Request identifier for correlating logs.
              schema:
                type: string
          content:
            application/json:
              schema:
                $ref: "../components/schemas/common.yaml#/schemas/ErrorResponse"
        "401":
          description: Токен отсутствует, истёк или недействителен
          headers:
            X-Request-ID:
              description: Request identifier for correlating logs.
              schema:
                type: string
          content:
            application/json:
              schema:
                $ref: "../components/schemas/common.yaml#/schemas/ErrorResponse"
        "500":
          description: Внутренняя ошибка при сохранении настроек
          headers:
            X-Request-ID:
              description: Request identifier for correlating logs.
              schema:
                type: string
          content:
            application/json:
              schema:
                $ref: "../components/schemas/common.yaml#/schemas/ErrorResponse"

  /api/v1/settings/change-password:
    post:
      summary: Сменить пароль
      operationId: changeSettingsPassword
      tags:
        - Settings
      security:
        - BearerAuth: []
        - CookieAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "../components/schemas/settings.yaml#/schemas/ChangePasswordRequest"
      responses:
        "200":
          description: Пароль изменён, остальные сессии отозваны
          headers:
            X-Request-ID:
              description: Request identifier for correlating logs.
              schema:
                type: string
          content:
            application/json:
              schema:
                $ref: "../components/schemas/common.yaml#/schemas/StatusResponse"
        "400":
          description: Ошибка валидации или неверный текущий пароль
          headers:
            X-Request-ID:
              description: Request identifier for correlating logs.
              schema:
                type: string
          content:
            application/json:
              schema:
                $ref: "../components/schemas/common.yaml#/schemas/ErrorResponse"
        "401":
          description: Токен отсутствует, истёк или недействителен
          headers:
            X-Request-ID:
              description: Request identifier for correlating logs.
              schema:
                type: string
          content:
            application/json:
              schema:
                $ref: "../components/schemas/common.yaml#/schemas/ErrorResponse"
        "500":
          description: Внутренняя ошибка при смене пароля
          headers:
            X-Request-ID:
              description: Request identifier for correlating logs.
              schema:
                type: string
          content:
            application/json:
              schema:
                $ref: "../components/schemas/common.yaml#/schemas/ErrorResponse"

  /api/v1/settings/notifications:
    patch:
      summary: Обновить настройки уведомлений
      operationId: patchSettingsNotifications
      tags:
        - Settings
      security:
        - BearerAuth: []
        - CookieAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "../components/schemas/settings.yaml#/schemas/UpdateNotificationsRequest"
      responses:
        "200":
          description: Настройки уведомлений успешно обновлены
          headers:
            X-Request-ID:
              description: Request identifier for correlating logs.
              schema:
                type: string
          content:
            application/json:
              schema:
                $ref: "../components/schemas/settings.yaml#/schemas/SettingsNotifications"
        "400":
          description: Ошибка валидации
          headers:
            X-Request-ID:
              description: Request identifier for correlating logs.
              schema:
                type: string
          content:
            application/json:
              schema:
                $ref: "../components/schemas/common.yaml#/schemas/ErrorResponse"
        "401":
          description: Токен отсутствует, истёк или недействителен
          headers:
            X-Request-ID:
              description: Request identifier for correlating logs.
              schema:
                type: string
          content:
            application/json:
              schema:
                $ref: "../components/schemas/common.yaml#/schemas/ErrorResponse"
        "500":
          description: Внутренняя ошибка при сохранении уведомлений
          headers:
            X-Request-ID:
              description: Request identifier for correlating logs.
              schema:
                type: string
          content:
            application/json:
              schema:
                $ref: "../components/schemas/common.yaml#/schemas/ErrorResponse"

  /api/v1/settings/sessions/{id}:
    delete:
      summary: Отозвать одну сессию
      operationId: deleteSettingsSession
      tags:
        - Settings
      security:
        - BearerAuth: []
        - CookieAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Сессия успешно отозвана
          headers:
            X-Request-ID:
              description: Request identifier for correlating logs.
              schema:
                type: string
          content:
            application/json:
              schema:
                $ref: "../components/schemas/common.yaml#/schemas/StatusResponse"
        "400":
          description: Нельзя отозвать текущую сессию или запрос некорректен
          headers:
            X-Request-ID:
              description: Request identifier for correlating logs.
              schema:
                type: string
          content:
            application/json:
              schema:
                $ref: "../components/schemas/common.yaml#/schemas/ErrorResponse"
        "401":
          description: Токен отсутствует, истёк или недействителен
          headers:
            X-Request-ID:
              description: Request identifier for correlating logs.
              schema:
                type: string
          content:
            application/json:
              schema:
                $ref: "../components/schemas/common.yaml#/schemas/ErrorResponse"
        "404":
          description: Сессия не найдена
          headers:
            X-Request-ID:
              description: Request identifier for correlating logs.
              schema:
                type: string
          content:
            application/json:
              schema:
                $ref: "../components/schemas/common.yaml#/schemas/ErrorResponse"
        "500":
          description: Внутренняя ошибка при отзыве сессии
          headers:
            X-Request-ID:
              description: Request identifier for correlating logs.
              schema:
                type: string
          content:
            application/json:
              schema:
                $ref: "../components/schemas/common.yaml#/schemas/ErrorResponse"

  /api/v1/settings/api-key/rotate:
    post:
      summary: Перевыпустить API-ключ
      operationId: rotateSettingsApiKey
      tags:
        - Settings
      security:
        - BearerAuth: []
        - CookieAuth: []
      responses:
        "200":
          description: Новый API-ключ успешно создан
          headers:
            X-Request-ID:
              description: Request identifier for correlating logs.
              schema:
                type: string
          content:
            application/json:
              schema:
                $ref: "../components/schemas/settings.yaml#/schemas/RotateAPIKeyResponse"
        "401":
          description: Токен отсутствует, истёк или недействителен
          headers:
            X-Request-ID:
              description: Request identifier for correlating logs.
              schema:
                type: string
          content:
            application/json:
              schema:
                $ref: "../components/schemas/common.yaml#/schemas/ErrorResponse"
        "500":
          description: Внутренняя ошибка при перевыпуске API-ключа
          headers:
            X-Request-ID:
              description: Request identifier for correlating logs.
              schema:
                type: string
          content:
            application/json:
              schema:
                $ref: "../components/schemas/common.yaml#/schemas/ErrorResponse"

  /api/v1/settings/export:
    post:
      summary: Поставить экспорт данных аккаунта в очередь
      operationId: postSettingsExport
      tags:
        - Settings
      security:
        - BearerAuth: []
        - CookieAuth: []
      responses:
        "200":
          description: Задача экспорта принята
          headers:
            X-Request-ID:
              description: Request identifier for correlating logs.
              schema:
                type: string
          content:
            application/json:
              schema:
                $ref: "../components/schemas/settings.yaml#/schemas/ExportDataResponse"
        "401":
          description: Токен отсутствует, истёк или недействителен
          headers:
            X-Request-ID:
              description: Request identifier for correlating logs.
              schema:
                type: string
          content:
            application/json:
              schema:
                $ref: "../components/schemas/common.yaml#/schemas/ErrorResponse"
        "500":
          description: Внутренняя ошибка при постановке экспорта в очередь
          headers:
            X-Request-ID:
              description: Request identifier for correlating logs.
              schema:
                type: string
          content:
            application/json:
              schema:
                $ref: "../components/schemas/common.yaml#/schemas/ErrorResponse"

  /api/v1/settings/account:
    delete:
      summary: Удалить аккаунт
      operationId: deleteSettingsAccount
      tags:
        - Settings
      security:
        - BearerAuth: []
        - CookieAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "../components/schemas/settings.yaml#/schemas/DeleteAccountRequest"
      responses:
        "200":
          description: Аккаунт успешно удалён
          headers:
            X-Request-ID:
              description: Request identifier for correlating logs.
              schema:
                type: string
          content:
            application/json:
              schema:
                $ref: "../components/schemas/common.yaml#/schemas/StatusResponse"
        "400":
          description: Неверное подтверждающее слово
          headers:
            X-Request-ID:
              description: Request identifier for correlating logs.
              schema:
                type: string
          content:
            application/json:
              schema:
                $ref: "../components/schemas/common.yaml#/schemas/ErrorResponse"
        "401":
          description: Токен отсутствует, истёк или недействителен
          headers:
            X-Request-ID:
              description: Request identifier for correlating logs.
              schema:
                type: string
          content:
            application/json:
              schema:
                $ref: "../components/schemas/common.yaml#/schemas/ErrorResponse"
        "500":
          description: Внутренняя ошибка при удалении аккаунта
          headers:
            X-Request-ID:
              description: Request identifier for correlating logs.
              schema:
                type: string
          content:
            application/json:
              schema:
                $ref: "../components/schemas/common.yaml#/schemas/ErrorResponse"
