paths:
  /api/v1/generate/config:
    get:
      summary: Справочные данные для страницы генерации
      description: Возвращает каталог маркетплейсов, визуальных стилей, типов карточек и допустимых количеств.
      operationId: getGenerateConfig
      tags:
        - Generation
      security:
        - BearerAuth: []
      responses:
        "200":
          description: Данные для формы запуска генерации
          headers:
            X-Request-ID:
              description: Request identifier for correlating logs.
              schema:
                type: string
          content:
            application/json:
              schema:
                $ref: "../components/schemas/generation.yaml#/schemas/GenerateConfigResponse"
        "401":
          description: Токен отсутствует, истёк или недействителен
          headers:
            X-Request-ID:
              description: Request identifier for correlating logs.
              schema:
                type: string
          content:
            application/json:
              schema:
                $ref: "../components/schemas/common.yaml#/schemas/ErrorResponse"

  /api/v1/uploads/images:
    post:
      summary: Загрузить исходное изображение для генерации
      description: Принимает один image-файл в multipart поле `file` и возвращает `asset_id` для следующего шага.
      operationId: uploadGenerationImage
      tags:
        - Generation
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required:
                - file
              properties:
                file:
                  type: string
                  format: binary
      responses:
        "201":
          description: Исходное изображение успешно загружено
          headers:
            X-Request-ID:
              description: Request identifier for correlating logs.
              schema:
                type: string
          content:
            application/json:
              schema:
                $ref: "../components/schemas/generation.yaml#/schemas/UploadImageResponse"
        "400":
          description: multipart-запрос некорректен или тип изображения не поддерживается
          headers:
            X-Request-ID:
              description: Request identifier for correlating logs.
              schema:
                type: string
          content:
            application/json:
              schema:
                $ref: "../components/schemas/common.yaml#/schemas/ErrorResponse"
        "401":
          description: Токен отсутствует, истёк или недействителен
          headers:
            X-Request-ID:
              description: Request identifier for correlating logs.
              schema:
                type: string
          content:
            application/json:
              schema:
                $ref: "../components/schemas/common.yaml#/schemas/ErrorResponse"
        "500":
          description: Внутренняя ошибка при сохранении файла
          headers:
            X-Request-ID:
              description: Request identifier for correlating logs.
              schema:
                type: string
          content:
            application/json:
              schema:
                $ref: "../components/schemas/common.yaml#/schemas/ErrorResponse"

  /api/v1/generations:
    post:
      summary: Запустить генерацию карточек
      description: Создаёт проект, записывает параметры запуска и ставит фоновую задачу генерации в очередь.
      operationId: createGeneration
      tags:
        - Generation
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "../components/schemas/generation.yaml#/schemas/CreateGenerationRequest"
      responses:
        "202":
          description: Генерация поставлена в очередь
          headers:
            X-Request-ID:
              description: Request identifier for correlating logs.
              schema:
                type: string
          content:
            application/json:
              schema:
                $ref: "../components/schemas/generation.yaml#/schemas/CreateGenerationResponse"
        "400":
          description: Ошибка валидации параметров генерации
          headers:
            X-Request-ID:
              description: Request identifier for correlating logs.
              schema:
                type: string
          content:
            application/json:
              schema:
                $ref: "../components/schemas/common.yaml#/schemas/ErrorResponse"
        "401":
          description: Токен отсутствует, истёк или недействителен
          headers:
            X-Request-ID:
              description: Request identifier for correlating logs.
              schema:
                type: string
          content:
            application/json:
              schema:
                $ref: "../components/schemas/common.yaml#/schemas/ErrorResponse"
        "404":
          description: Исходное изображение не найдено
          headers:
            X-Request-ID:
              description: Request identifier for correlating logs.
              schema:
                type: string
          content:
            application/json:
              schema:
                $ref: "../components/schemas/common.yaml#/schemas/ErrorResponse"
        "409":
          description: Текущий billing-лимит не позволяет запустить ещё одну генерацию
          headers:
            X-Request-ID:
              description: Request identifier for correlating logs.
              schema:
                type: string
          content:
            application/json:
              schema:
                $ref: "../components/schemas/common.yaml#/schemas/ErrorResponse"
        "500":
          description: Внутренняя ошибка при создании generation job
          headers:
            X-Request-ID:
              description: Request identifier for correlating logs.
              schema:
                type: string
          content:
            application/json:
              schema:
                $ref: "../components/schemas/common.yaml#/schemas/ErrorResponse"

  /api/v1/generations/{id}:
    get:
      summary: Получить статус генерации
      description: Возвращает текущий progress generation job, а после завершения — список готовых карточек и ссылку на архив.
      operationId: getGenerationById
      tags:
        - Generation
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Текущее состояние генерации
          headers:
            X-Request-ID:
              description: Request identifier for correlating logs.
              schema:
                type: string
          content:
            application/json:
              schema:
                $ref: "../components/schemas/generation.yaml#/schemas/GenerationStatusResponse"
        "401":
          description: Токен отсутствует, истёк или недействителен
          headers:
            X-Request-ID:
              description: Request identifier for correlating logs.
              schema:
                type: string
          content:
            application/json:
              schema:
                $ref: "../components/schemas/common.yaml#/schemas/ErrorResponse"
        "404":
          description: Генерация не найдена
          headers:
            X-Request-ID:
              description: Request identifier for correlating logs.
              schema:
                type: string
          content:
            application/json:
              schema:
                $ref: "../components/schemas/common.yaml#/schemas/ErrorResponse"
        "500":
          description: Внутренняя ошибка при загрузке статуса генерации
          headers:
            X-Request-ID:
              description: Request identifier for correlating logs.
              schema:
                type: string
          content:
            application/json:
              schema:
                $ref: "../components/schemas/common.yaml#/schemas/ErrorResponse"
