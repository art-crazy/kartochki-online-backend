      summary: Получить данные billing-страницы
      operationId: getBilling
      tags:
        - Billing
      security:
        - BearerAuth: []
        - CookieAuth: []
      responses:
        '200':
          description: Текущая подписка, тарифы и разовые пакеты карточек
          headers:
            X-Request-ID:
              description: Request identifier for correlating logs.
              schema:
                type: string
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BillingResponse'
        '401':
          description: Токен отсутствует, истёк или недействителен
          headers:
            X-Request-ID:
              description: Request identifier for correlating logs.
              schema:
                type: string
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Внутренняя ошибка при загрузке billing-данных
          headers:
            X-Request-ID:
              description: Request identifier for correlating logs.
              schema:
                type: string
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /api/v1/billing/checkout:
    post:
      summary: Создать checkout для тарифа
      operationId: createBillingCheckout
      tags:
        - Billing
      security:
        - BearerAuth: []
        - CookieAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateCheckoutRequest'
      responses:
        '202':
          description: Checkout успешно создан
          headers:
            X-Request-ID:
              description: Request identifier for correlating logs.
              schema:
                type: string
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CreateCheckoutResponse'
        '400':
          description: Ошибка валидации запроса
          headers:
            X-Request-ID:
              description: Request identifier for correlating logs.
              schema:
                type: string
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Токен отсутствует, истёк или недействителен
          headers:
            X-Request-ID:
              description: Request identifier for correlating logs.
              schema:
                type: string
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Запрошенный тариф не найден
          headers:
            X-Request-ID:
              description: Request identifier for correlating logs.
              schema:
                type: string
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '409':
          description: Запрошенный тариф уже активен
          headers:
            X-Request-ID:
              description: Request identifier for correlating logs.
              schema:
                type: string
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '501':
          description: Платёжный провайдер ещё не подключён
          headers:
            X-Request-ID:
              description: Request identifier for correlating logs.
              schema:
                type: string
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /api/v1/billing/addons:
    post:
      summary: Создать checkout для разового пакета
      operationId: createBillingAddonCheckout
      tags:
        - Billing
      security:
        - BearerAuth: []
        - CookieAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PurchaseAddonRequest'
      responses:
        '202':
          description: Checkout для пакета успешно создан
          headers:
            X-Request-ID:
              description: Request identifier for correlating logs.
              schema:
                type: string
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PurchaseAddonResponse'
        '400':
          description: Ошибка валидации запроса
          headers:
            X-Request-ID:
              description: Request identifier for correlating logs.
              schema:
                type: string
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Токен отсутствует, истёк или недействителен
          headers:
            X-Request-ID:
              description: Request identifier for correlating logs.
              schema:
                type: string
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Запрошенный пакет не найден
          headers:
            X-Request-ID:
              description: Request identifier for correlating logs.
              schema:
                type: string
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '501':
          description: Платёжный провайдер ещё не подключён
          headers:
            X-Request-ID:
              description: Request identifier for correlating logs.
              schema:
                type: string
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /api/v1/billing/cancel:
    post:
      summary: Отключить автопродление подписки
      operationId: cancelBillingSubscription
      tags:
        - Billing
      security:
        - BearerAuth: []
        - CookieAuth: []
      responses:
        '200':
          description: Автопродление успешно отключено
          headers:
            X-Request-ID:
              description: Request identifier for correlating logs.
              schema:
                type: string
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CancelSubscriptionResponse'
        '401':
          description: Токен отсутствует, истёк или недействителен
          headers:
            X-Request-ID:
              description: Request identifier for correlating logs.
              schema:
                type: string
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '409':
          description: Нечего отменять или подписка уже на отмене
          headers:
            X-Request-ID:
              description: Request identifier for correlating logs.
              schema:
                type: string
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Внутренняя ошибка при отмене подписки
          headers:
            X-Request-ID:
              description: Request identifier for correlating logs.
              schema:
                type: string
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /api/v1/billing/webhook:
    post:
      summary: Webhook-уведомление от ЮКасса
      description: |
        Принимает события payment.succeeded и payment.canceled от ЮКасса.
        Подпись проверяется через заголовок YooKassa-Signature (HMAC-SHA256).
        Endpoint не требует авторизации пользователя — он публичный, но защищён подписью.
        ЮКасса повторяет уведомление при ответах, отличных от 2xx, поэтому обработка идемпотентна.
      operationId: billingWebhook
      tags:
        - Billing
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/YooKassaWebhookEvent'
      responses:
        '200':
          description: Событие принято и обработано
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StatusResponse'
        '400':
          description: Невалидное тело запроса или неизвестный тип события
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Неверная подпись YooKassa-Signature
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Внутренняя ошибка при обработке события
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /api/v1/public/blog:
    get:
      summary: Публичный список статей блога
      description: Возвращает SEO-страницу `/blog` с featured-материалом, списком статей и боковыми блоками.
      operationId: listPublicBlogPosts
      tags:
        - Blog
      parameters:
        - in: query
          name: page
          schema:
            type: integer
            minimum: 1
            default: 1
          description: Номер страницы списка статей.
        - in: query
          name: page_size
          schema:
            type: integer
            minimum: 1
            maximum: 50
            default: 12
          description: Размер страницы серверной пагинации.
      responses:
        '200':
          description: Данные публичного списка статей
          headers:
            X-Request-ID:
              description: Request identifier for correlating logs.
              schema:
                type: string
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BlogListResponse'
        '400':
          description: Ошибка валидации query params
          headers:
            X-Request-ID:
              description: Request identifier for correlating logs.
              schema:
                type: string
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Внутренняя ошибка при загрузке списка статей
          headers:
            X-Request-ID:
              description: Request identifier for correlating logs.
              schema:
                type: string
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /api/v1/public/blog/{slug}:
    get:
      summary: Публичная статья блога
      description: Возвращает SEO-страницу статьи `/blog/{slug}` вместе с секциями и related-материалами.
      operationId: getPublicBlogPostBySlug
      tags:
        - Blog
      parameters:
        - in: path
          name: slug
          required: true
          schema:
            type: string
          description: Человекочитаемый slug статьи.
      responses:
        '200':
          description: Данные одной опубликованной статьи
          headers:
            X-Request-ID:
              description: Request identifier for correlating logs.
              schema:
                type: string
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BlogPostResponse'
        '404':
          description: Опубликованная статья не найдена
          headers:
            X-Request-ID:
              description: Request identifier for correlating logs.
              schema:
                type: string
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Внутренняя ошибка при загрузке статьи
          headers:
            X-Request-ID:
              description: Request identifier for correlating logs.
              schema:
                type: string
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: opaque
      description: 'Передавайте токен в заголовке Authorization: Bearer <token>.'
    CookieAuth:
      type: apiKey
      in: cookie
      name: auth_token
      description: HttpOnly-кука auth_token, устанавливается автоматически при входе. Браузер прикладывает её к каждому запросу без дополнительного кода.
  schemas:
    HealthResponse:
      type: object
      required:
        - status
      properties:
        status:
          type: string
          enum:
            - ok
            - degraded
          example: ok
    StatusResponse:
      type: object
      required:
        - status
      properties:
        status:
          type: string
          description: Результат операции.
          enum:
            - accepted
            - password_changed
            - logged_out
            - deleted
          example: accepted
    ErrorResponse:
      type: object
      required:
        - code
        - message
      properties:
        code:
          type: string
          example: not_found
        message:
          type: string
          example: ресурс не найден
        request_id:
          type: string
          example: 01HZY3GQK0M5YAWQ2N6R8T9P1S
        details:
          type: array
          items:
            $ref: '#/components/schemas/ErrorDetail'
    ErrorDetail:
      type: object
      required:
        - message
      properties:
        field:
          type: string
          example: email
        message:
          type: string
          example: поле обязательно
    RegisterRequest:
      type: object
      required:
        - email
        - password
      properties:
        name:
          type: string
          example: Иван
        email:
          type: string
          format: email
          example: ivan@example.com
        password:
          type: string
          format: password
          example: nadezhnyy-parol-123
    LoginRequest:
      type: object
      required:
        - email
        - password
      properties:
        email:
          type: string
          format: email
          example: ivan@example.com
        password:
          type: string
          format: password
          example: nadezhnyy-parol-123
    TelegramLoginRequest:
      type: object
      required:
        - id
        - auth_date
        - hash
      properties:
        id:
          type: integer
          format: int64
          example: 123456789
        first_name:
          type: string
          example: Иван
        last_name:
          type: string
          example: Иванов
        username:
          type: string
          example: ivanov
        photo_url:
          type: string
          format: uri
          example: https://t.me/i/userpic/320/example.jpg
        auth_date:
          type: integer
          format: int64
          example: 1712500000
        hash:
          type: string
          example: 7d3f6f8d3df0f70e18b1aabf6b8d2d11fdc4d4ab6f8d9c0d1c2b3a4f5e6d7c8b
    VkWidgetLoginRequest:
      type: object
      required:
        - code
        - device_id
      properties:
        code:
          type: string
          description: Code, полученный frontend из события LOGIN_SUCCESS виджета VK ID One Tap.
          example: vk_widget_code
        device_id:
          type: string
          description: Device ID, полученный frontend из события LOGIN_SUCCESS виджета VK ID One Tap.
          example: vk_device_id
    YandexWidgetLoginRequest:
      type: object
      required:
        - access_token
      properties:
        access_token:
          type: string
          description: Access token, полученный от виджета Яндекс ID.
          example: y0_AgAAAAAExampleAccessToken
    ForgotPasswordRequest:
      type: object
      required:
        - email
      properties:
        email:
          type: string
          format: email
          example: ivan@example.com
    ResetPasswordRequest:
      type: object
      required:
        - token
        - password
      properties:
        token:
          type: string
          description: Одноразовый токен из письма для сброса пароля.
          example: xK9mQ2rTv8nYpL3wZd5jF1cB6oE4sA7h
        password:
          type: string
          format: password
          description: Новый пароль пользователя.
          example: novyy-nadezhnyy-parol-456
    AuthUser:
      type: object
      required:
        - id
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
          example: Иван
        email:
          type: string
          format: email
          nullable: true
          example: ivan@example.com
    AuthSession:
      type: object
      required:
        - access_token
        - token_type
        - expires_at
      properties:
        access_token:
          type: string
          example: 7fD2D1Xnq6C7xBskjPq6WQ6OHvOjQJE9P0Q-7m4w1RU
        token_type:
          type: string
          example: Bearer
        expires_at:
          type: string
          format: date-time
    AuthResponse:
      type: object
      required:
        - user
        - session
      properties:
        user:
          $ref: '#/components/schemas/AuthUser'
        session:
          $ref: '#/components/schemas/AuthSession'
    CurrentUserResponse:
      type: object
      required:
        - user
      properties:
        user:
          $ref: '#/components/schemas/AuthUser'
    CreateProjectRequest:
      type: object
      required:
        - title
      properties:
        title:
          type: string
          minLength: 1
          maxLength: 200
          example: Кроссовки Nike Air Max
        marketplace:
          type: string
          maxLength: 100
          example: wildberries
        product_name:
          type: string
          maxLength: 255
          example: Nike Air Max 90
        product_description:
          type: string
          maxLength: 5000
          example: Белые кроссовки для повседневной носки
    PatchProjectRequest:
      type: object
      description: Достаточно передать только те поля, которые нужно изменить.
      minProperties: 1
      properties:
        title:
          type: string
          minLength: 1
          maxLength: 200
          example: Обновлённое название проекта
        marketplace:
          type: string
          maxLength: 100
          example: ozon
        product_name:
          type: string
          maxLength: 255
          example: Nike Air Max 90 Premium
        product_description:
          type: string
          maxLength: 5000
          example: Новое описание товара для карточки
    Project:
      type: object
      required:
        - id
        - title
        - status
        - created_at
        - updated_at
      properties:
        id:
          type: string
          format: uuid
        title:
          type: string
          example: Кроссовки Nike Air Max
        marketplace:
          type: string
          example: wildberries
        product_name:
          type: string
          example: Nike Air Max 90
        product_description:
          type: string
          example: Белые кроссовки для повседневной носки
        status:
          type: string
          enum:
            - draft
            - active
            - archived
          example: draft
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
    ProjectResponse:
      type: object
      required:
        - project
      properties:
        project:
          $ref: '#/components/schemas/Project'
    ProjectListResponse:
      type: object
      required:
        - projects
      properties:
        projects:
          type: array
          items:
            $ref: '#/components/schemas/Project'
    DashboardProject:
      type: object
      required:
        - id
        - title
        - updated_at
        - canonical_path
      properties:
        id:
          type: string
          format: uuid
        title:
          type: string
          example: Кроссовки Nike Air Max
        card_count:
          type: integer
          example: 6
        marketplace_id:
          type: string
          example: wildberries
        updated_at:
          type: string
          format: date-time
        preview_urls:
          type: array
          items:
            type: string
            format: uri
        canonical_path:
          type: string
          example: /app/projects/7f3e1a2b-...
    DashboardStat:
      type: object
      required:
        - key
        - label
        - value
        - description
      properties:
        key:
          type: string
          example: total_projects
        label:
          type: string
          example: Всего проектов
        value:
          type: string
          example: '12'
        description:
          type: string
          example: проектов создано
        accent_text:
          type: string
        progress:
          type: object
          properties:
            value:
              type: integer
            max:
              type: integer
    DashboardQuickStart:
      type: object
      required:
        - title
        - description
        - canonical_path
      properties:
        title:
          type: string
          example: Создайте первый проект
        description:
          type: string
          example: Загрузите фото товара — мы сгенерируем карточки для маркетплейса
        canonical_path:
          type: string
          example: /app/generate
    DashboardResponse:
      type: object
      required:
        - stats
        - recent_projects
        - all_projects
        - quick_start
      properties:
        stats:
          type: array
          items:
            $ref: '#/components/schemas/DashboardStat'
        recent_projects:
          type: array
          items:
            $ref: '#/components/schemas/DashboardProject'
        all_projects:
          type: array
          items:
            $ref: '#/components/schemas/DashboardProject'
        quick_start:
          $ref: '#/components/schemas/DashboardQuickStart'
    GenerateConfigResponse:
      type: object
      required:
        - marketplaces
        - styles
        - card_types
        - card_count_options
        - models
      properties:
        marketplaces:
          type: array
          items:
            $ref: '#/components/schemas/GenerateMarketplace'
        styles:
          type: array
          items:
            $ref: '#/components/schemas/GenerateStyle'
        card_types:
          type: array
          items:
            $ref: '#/components/schemas/GenerateCardType'
        card_count_options:
          type: array
          items:
            type: integer
        models:
          type: array
          description: Доступные AI-модели. Первая — выбор по умолчанию. price_per_image × card_count = итоговая стоимость.
          items:
            $ref: '#/components/schemas/GenerateModel'
    GenerateMarketplace:
      type: object
      required:
        - id
        - label
      properties:
        id:
          type: string
          example: wildberries
        label:
          type: string
          example: Wildberries
    GenerateStyle:
      type: object
      required:
        - id
        - label
      properties:
        id:
          type: string
          example: clean_catalog
        label:
          type: string
          example: Чистый каталог
    GenerateCardType:
      type: object
      required:
        - id
        - label
      properties:
        id:
          type: string
          example: cover
        label:
          type: string
          example: Обложка
        default_selected:
          type: boolean
          example: true
    UploadImageResponse:
      type: object
      required:
        - asset_id
        - preview_url
      properties:
        asset_id:
          type: string
          format: uuid
        preview_url:
          type: string
          format: uri
          example: http://localhost:8080/media/uploads/user-id/source.png
    CreateGenerationRequest:
      type: object
      required:
        - marketplace_id
        - style_id
        - card_type_ids
        - card_count
        - source_asset_id
      properties:
        project_name:
          type: string
          maxLength: 200
          example: Карточки для летней коллекции
        marketplace_id:
          type: string
          example: wildberries
        style_id:
          type: string
          example: clean_catalog
        card_type_ids:
          type: array
          minItems: 1
          items:
            type: string
          example:
            - cover
            - benefits
            - details
        card_count:
          type: integer
          example: 5
        source_asset_id:
          type: string
          format: uuid
        model_id:
          type: string
          description: Идентификатор AI-модели из каталога /generate/config. Если не указан, используется первая модель по умолчанию.
          example: google/gemini-2.5-flash-image
    CreateGenerationResponse:
      type: object
      required:
        - generation_id
        - status
      properties:
        generation_id:
          type: string
          format: uuid
        status:
          type: string
          enum:
            - queued
          example: queued
    GenerationStatusResponse:
      type: object
      required:
        - generation_id
        - status
      properties:
        generation_id:
          type: string
          format: uuid
        status:
          type: string
          enum:
            - queued
            - processing
            - completed
            - failed
          example: processing
        current_step:
          type: string
          example: rendering_cards
        progress_percent:
          type: integer
          example: 60
        error_message:
          type: string
          example: failed to create archive
        archive_download_url:
          type: string
          format: uri
