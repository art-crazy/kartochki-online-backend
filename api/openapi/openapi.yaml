    YooKassaPaymentObject:
      type: object
      required:
        - id
        - status
        - amount
        - metadata
      properties:
        id:
          type: string
          example: 2a4e4c49-000f-5000-a000-1e1ce5e3b4c4
        status:
          type: string
          enum:
            - succeeded
            - canceled
          example: succeeded
        amount:
          type: object
          properties:
            value:
              type: string
              example: "1490.00"
            currency:
              type: string
              example: RUB
