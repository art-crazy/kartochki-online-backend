openapi: 3.0.3
info:
  title: kartochki.online API
  version: 0.1.0
  description: Backend API skeleton for kartochki.online
servers:
  - url: http://localhost:8080
paths:
  /health/live:
    get:
      summary: Liveness probe
      operationId: getLiveHealth
      tags:
        - Health
      responses:
        "200":
          description: OK
          headers:
            X-Request-ID:
              description: Request identifier for log correlation.
              schema:
                type: string
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthResponse"
  /health/ready:
    get:
      summary: Readiness probe
      operationId: getReadyHealth
      tags:
        - Health
      responses:
        "200":
          description: OK
          headers:
            X-Request-ID:
              description: Request identifier for log correlation.
              schema:
                type: string
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthResponse"
        "503":
          description: Dependencies are unavailable
          headers:
            X-Request-ID:
              description: Request identifier for log correlation.
              schema:
                type: string
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthResponse"
components:
  schemas:
    HealthResponse:
      type: object
      required:
        - status
      properties:
        status:
          type: string
          enum:
            - ok
            - degraded
          example: ok
    ErrorResponse:
      type: object
      required:
        - code
        - message
      properties:
        code:
          type: string
          example: not_found
        message:
          type: string
          example: resource not found
        request_id:
          type: string
          example: 01HZY3GQK0M5YAWQ2N6R8T9P1S
        details:
          type: array
          items:
            $ref: "#/components/schemas/ErrorDetail"
    ErrorDetail:
      type: object
      required:
        - message
      properties:
        field:
          type: string
          example: email
        message:
          type: string
          example: field is required
